<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>417 Maid Chat</title>
  <style>
    *{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#eef2f7;color:#172033}.hidden{display:none!important}.shell{height:100vh;display:grid;grid-template-columns:340px 1fr}.sidebar{background:#fff;border-right:1px solid #dfe5ec;display:flex;flex-direction:column}.brand{padding:18px;font-weight:1000;font-size:22px;border-bottom:1px solid #e8edf3}.user{padding:12px 18px;color:#667085;font-size:13px}.list{overflow:auto;flex:1}.conversation{padding:15px 18px;border-bottom:1px solid #f0f2f5;cursor:pointer}.conversation.active{background:#eaf7f1}.conversation strong{display:block}.conversation small{display:block;color:#667085;margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.chat{display:flex;flex-direction:column;min-width:0}.chat-head{height:70px;background:#fff;border-bottom:1px solid #dfe5ec;padding:18px;font-weight:1000}.messages{flex:1;overflow:auto;padding:22px;background:linear-gradient(180deg,#eef4f1,#e8efed)}.bubble{max-width:72%;background:#fff;padding:10px 13px;border-radius:16px;margin:8px 0;box-shadow:0 3px 10px rgba(15,23,42,.06)}.bubble.mine{margin-left:auto;background:#d8fdd2}.bubble b{display:block;font-size:12px;margin-bottom:4px}.bubble time{display:block;text-align:right;color:#667085;font-size:10px;margin-top:5px}.composer{background:#fff;border-top:1px solid #dfe5ec;padding:12px;display:flex;gap:8px}.composer input{flex:1;padding:14px;border:1px solid #ccd5df;border-radius:999px;font-size:16px}.composer button,.login button{border:0;background:#167c5a;color:#fff;border-radius:999px;padding:0 20px;font-weight:900}.login-wrap{min-height:100vh;display:grid;place-items:center;background:linear-gradient(135deg,#0f172a,#164e63)}.login{width:min(420px,92vw);background:#fff;border-radius:26px;padding:28px;box-shadow:0 25px 70px rgba(0,0,0,.3)}.login h1{margin-top:0}.login input{width:100%;padding:15px;border:1px solid #d0d5dd;border-radius:14px;margin:7px 0;font-size:16px}.login button{width:100%;padding:15px;margin-top:10px}.status{color:#b42318;font-weight:700;font-size:13px;margin-top:10px}@media(max-width:760px){.shell{grid-template-columns:1fr}.sidebar{display:none}.shell.show-list .sidebar{display:flex}.shell.show-list .chat{display:none}.bubble{max-width:88%}}
  </style>
</head>
<body>
  <section id="loginView" class="login-wrap">
    <form id="loginForm" class="login">
      <h1>💬 417 Maid Chat</h1>
      <p>Aplicación independiente de comunicación.</p>
      <input id="code" placeholder="Código" value="0001">
      <input id="password" type="password" placeholder="Contraseña" value="1234">
      <button>Entrar</button>
      <div id="loginStatus" class="status"></div>
    </form>
  </section>

  <main id="appView" class="shell hidden">
    <aside class="sidebar">
      <div class="brand">417 Maid Chat</div>
      <div id="currentUser" class="user"></div>
      <div id="conversationList" class="list"></div>
    </aside>
    <section class="chat">
      <div id="chatTitle" class="chat-head">Selecciona una conversación</div>
      <div id="messages" class="messages"></div>
      <form id="composer" class="composer">
        <input id="messageInput" placeholder="Escribe un mensaje..." autocomplete="off">
        <button>Enviar</button>
      </form>
    </section>
  </main>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    let token='', me=null, socket=null, activeConversation=null;
    const $=id=>document.getElementById(id);

    async function api(url, options={}){
      const response=await fetch(url,{...options,headers:{'Content-Type':'application/json',...(token?{Authorization:`Bearer ${token}`}:{}) ,...(options.headers||{})}});
      const data=await response.json();
      if(!response.ok) throw new Error(data.message||'Error');
      return data;
    }

    $('loginForm').addEventListener('submit',async e=>{
      e.preventDefault();
      $('loginStatus').textContent='';
      try{
        const data=await api('/api/auth/login',{method:'POST',body:JSON.stringify({code:$('code').value,password:$('password').value})});
        token=data.token; me=data.user;
        $('loginView').classList.add('hidden'); $('appView').classList.remove('hidden');
        $('currentUser').textContent=`${me.name} · ${me.role}`;
        connectSocket(); await loadConversations();
      }catch(error){$('loginStatus').textContent=error.message}
    });

    function connectSocket(){
      socket=io({auth:{token}});
      socket.on('message:new',message=>{if(message.conversation_id===activeConversation) appendMessage(message)});
    }

    async function loadConversations(){
      const data=await api('/api/conversations');
      $('conversationList').innerHTML='';
      data.conversations.forEach(c=>{
        const el=document.createElement('div');el.className='conversation';
        el.innerHTML=`<strong>${escapeHtml(c.title||'Conversación')}</strong><small>${escapeHtml(c.last_message||'Sin mensajes')}</small>`;
        el.onclick=()=>openConversation(c,el);$('conversationList').appendChild(el);
      });
    }

    async function openConversation(c,el){
      activeConversation=c.id;$('chatTitle').textContent=c.title||'Conversación';
      document.querySelectorAll('.conversation').forEach(x=>x.classList.remove('active'));el.classList.add('active');
      const data=await api(`/api/conversations/${c.id}/messages`);$('messages').innerHTML='';data.messages.forEach(appendMessage);
    }

    function appendMessage(m){
      const el=document.createElement('div');el.className=`bubble ${m.sender_id===me.id?'mine':''}`;
      el.innerHTML=`<b>${escapeHtml(m.sender_name||'Usuario')}</b>${escapeHtml(m.body)}<time>${new Date(m.created_at).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}</time>`;
      $('messages').appendChild(el);$('messages').scrollTop=$('messages').scrollHeight;
    }

    $('composer').addEventListener('submit',e=>{
      e.preventDefault();const body=$('messageInput').value.trim();if(!body||!activeConversation||!socket)return;
      socket.emit('message:send',{conversationId:activeConversation,body},result=>{if(result?.ok)$('messageInput').value='';});
    });

    function escapeHtml(v){return String(v||'').replace(/[&<>'"]/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[ch]))}
  </script>
</body>
</html>
