<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0b141a">
  <title>417 Maid Chat</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <section id="loginView" class="login-view">
    <form id="loginForm" class="login-card">
      <div class="brand">💬</div>
      <h1>417 Maid Chat</h1>
      <p>Habla directamente con Administración.</p>
      <input id="codeInput" placeholder="Código de empleado" autocomplete="username" required>
      <button type="submit">Entrar</button>
      <div id="loginStatus" class="status"></div>
    </form>
  </section>

  <main id="appView" class="app hidden">
    <aside class="sidebar">
      <header class="sidebar-head">
        <div><strong>417 Maid Chat</strong><small id="userLabel"></small></div>
        <button id="logoutBtn" class="icon-btn" title="Salir">↪</button>
      </header>
      <div class="search-wrap"><input id="conversationSearch" placeholder="Buscar chat"></div>
      <div id="conversationList" class="conversation-list"></div>
    </aside>

    <section class="chat-panel">
      <header class="chat-head">
        <button id="backBtn" class="mobile-back">‹</button>
        <div><strong id="conversationTitle">Selecciona un chat</strong><small id="typingLabel"></small></div>
        <button id="callBtn" class="icon-btn" title="Llamadas en próxima fase">☎</button>
      </header>

      <div id="messageList" class="message-list"><div class="empty">Selecciona una conversación.</div></div>

      <section id="mediaQueue" class="media-queue hidden"></section>

      <form id="composer" class="composer hidden">
        <button id="attachMenuBtn" type="button" class="attach-btn" title="Adjuntar">＋</button>
        <textarea id="messageInput" rows="1" placeholder="Escribe un mensaje"></textarea>
        <button type="submit" class="send-btn">➤</button>
      </form>

      <div id="attachMenu" class="attach-menu hidden">
        <label>📷 Cámara<input id="cameraInput" type="file" accept="image/*,video/*" capture="environment" multiple hidden></label>
        <label>🖼 Fotos y videos<input id="mediaInput" type="file" accept="image/*,video/*" multiple hidden></label>
        <label>🎤 Audio<input id="audioInput" type="file" accept="audio/*" multiple hidden></label>
        <label>📎 Documento<input id="documentInput" type="file" accept=".pdf,.doc,.docx,.xls,.xlsx,.csv,.txt,.zip" multiple hidden></label>
      </div>

      <div id="uploadStatus" class="upload-status"></div>
    </section>
  </main>

  <div id="mediaViewer" class="media-viewer hidden">
    <button id="closeViewer" class="viewer-close">×</button>
    <div id="viewerContent"></div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/app.js"></script>
</body>
</html>
