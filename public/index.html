<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0b141a">
  <title>417 Maid Chat</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <section id="loginView" class="login-view">
    <form id="loginForm" class="login-card">
      <div class="brand">💬</div>
      <h1>417 Maid Chat</h1>
      <p>Habla directamente con Administración.</p>
      <input id="codeInput" placeholder="Código de empleado" autocomplete="username" required>
      <button type="submit">Entrar</button>
      <div id="loginStatus" class="status"></div>
    </form>
  </section>

  <main id="appView" class="app hidden">
    <aside class="sidebar">
      <header class="sidebar-head">
        <div><strong>417 Maid Chat</strong><small id="userLabel"></small></div>
        <button id="logoutBtn" class="icon-btn" title="Salir">↪</button>
      </header>
      <div class="search-wrap"><input id="conversationSearch" placeholder="Buscar chat"></div>
      <div id="conversationList" class="conversation-list"></div>
    </aside>

    <section class="chat-panel">
      <header class="chat-head">
        <button id="backBtn" class="mobile-back">‹</button>
        <div><strong id="conversationTitle">Selecciona un chat</strong><small id="typingLabel"></small></div>
        <button id="callBtn" class="icon-btn" title="Llamadas en próxima fase">☎</button>
      </header>

      <div id="messageList" class="message-list"><div class="empty">Selecciona una conversación.</div></div>

      <section id="mediaQueue" class="media-queue hidden"></section>

      <form id="composer" class="composer hidden">
        <button id="attachMenuBtn" type="button" class="attach-btn" title="Adjuntar">＋</button>
        <textarea id="messageInput" rows="1" placeholder="Escribe un mensaje"></textarea>
        <button id="voiceRecordBtn" type="button" class="voice-btn" title="Grabar audio">🎤</button>
        <button type="submit" class="send-btn">➤</button>
      </form>

      <div id="audioRecorderBar" class="recorder-bar hidden">
        <span class="record-dot"></span>
        <strong id="audioTimer">00:00</strong>
        <span class="recorder-label">Grabando audio...</span>
        <button id="cancelAudioBtn" type="button">Cancelar</button>
        <button id="finishAudioBtn" type="button" class="finish-record">Enviar</button>
      </div>

      <div id="attachMenu" class="attach-menu hidden">
        <label>📷 Tomar foto<input id="cameraInput" type="file" accept="image/*" capture="environment" hidden></label>
        <button id="recordVideoBtn" type="button">🎥 Grabar video HD</button>
        <label>🖼 Fotos y videos originales<input id="mediaInput" type="file" accept="image/*,video/*" multiple hidden></label>
        <label>🎧 Subir audio<input id="audioInput" type="file" accept="audio/*" multiple hidden></label>
        <label>📎 Documento<input id="documentInput" type="file" accept=".pdf,.doc,.docx,.xls,.xlsx,.csv,.txt,.zip" multiple hidden></label>
        <input id="videoFallbackInput" type="file" accept="video/*" capture="environment" hidden>
      </div>

      <div id="uploadStatus" class="upload-status"></div>
    </section>
  </main>

  <div id="videoRecorderModal" class="record-modal hidden">
    <div class="record-card">
      <div class="record-head">
        <div>
          <strong>Grabar video HD</strong>
          <small id="videoQualityLabel">Preparando cámara...</small>
        </div>
        <button id="closeVideoRecorder" type="button">×</button>
      </div>
      <video id="videoPreview" autoplay muted playsinline></video>
      <div class="record-controls">
        <span id="videoTimer">00:00</span>
        <button id="startVideoBtn" type="button" class="record-main">● Grabar</button>
        <button id="stopVideoBtn" type="button" class="record-stop hidden">■ Terminar</button>
        <button id="switchCameraBtn" type="button">↺ Cámara</button>
      </div>
      <p class="quality-note">El chat solicita la resolución más alta disponible y no reduce la calidad antes de subir el archivo.</p>
    </div>
  </div>

  <div id="mediaViewer" class="media-viewer hidden">
    <button id="closeViewer" class="viewer-close">×</button>
    <div id="viewerContent"></div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/app.js"></script>
</body>
</html>
